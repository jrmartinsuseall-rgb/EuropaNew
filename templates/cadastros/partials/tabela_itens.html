<div class="card form-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th style="width:120px">Identificação</th>
          <th>Descrição</th>
          <th style="width:130px">Grupo</th>
          <th style="width:80px" class="text-center">Tipo</th>
          <th style="width:50px">UN</th>
          <th style="width:110px">Preço Base</th>
          <th style="width:80px">Situação</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        {% for i in itens %}
          {% include "cadastros/partials/linha_item.html" %}
        {% empty %}
        <tr>
          <td colspan="8" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-4 d-block mb-1"></i>Nenhum item encontrado.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if itens %}
  <div class="card-footer text-muted small py-1 px-3">{{ itens|length }} registro(s) exibido(s)</div>
  {% endif %}
</div>
