{% if pessoas %}
<div class="table-responsive">
  <table class="table table-hover table-sm mb-0">
    <thead class="table-light">
      <tr>
        <th style="width:50px">#</th>
        <th>Nome</th>
        <th style="width:130px">CPF/CNPJ</th>
        <th style="width:120px">Fone</th>
        <th style="width:120px">Celular</th>
        <th style="width:60px" class="text-center">Equipe</th>
        <th style="width:80px" class="text-center">Status</th>
        <th style="width:80px"></th>
      </tr>
    </thead>
    <tbody>
      {% for p in pessoas %}
      {% include "cadastros/partials/linha_tecnico.html" %}
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="text-center text-muted py-4">
  <i class="bi bi-person-gear d-block fs-3 mb-2"></i>Nenhum técnico encontrado.
</div>
{% endif %}
