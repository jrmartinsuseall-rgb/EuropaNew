<div class="card form-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th>Nome / Razão Social</th>
          <th style="width:160px">CPF / CNPJ</th>
          <th style="width:140px">Telefone</th>
          <th style="width:160px">Cidade</th>
          <th style="width:90px">Tipo</th>
          <th style="width:80px">Situação</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        {% for c in clientes %}
          {% include "cadastros/partials/linha_cliente.html" %}
        {% empty %}
        <tr>
          <td colspan="8" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-4 d-block mb-1"></i>
            Nenhum registro encontrado.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if clientes %}
  <div class="card-footer text-muted small py-1 px-3">
    {{ clientes|length }} registro(s) exibido(s)
  </div>
  {% endif %}
</div>
