<tr id="metodo-{{ m.pk }}" class="{% if m.inativo %}text-muted{% endif %}">
  <td class="text-muted small">{{ m.pk }}</td>
  <td>
    <a href="{% url 'cadastros:metodo_edit' m.pk %}" class="text-decoration-none fw-semibold">
      {{ m.descricao }}
    </a>
  </td>
  <td class="small font-monospace">{{ m.sigla|default:"—" }}</td>
  <td class="text-center">
    {% if m.movcaixa %}
      <i class="bi bi-check-circle-fill text-success" title="Sim"></i>
    {% else %}
      <i class="bi bi-dash-circle text-muted" title="Não"></i>
    {% endif %}
  </td>
  <td class="small text-muted">{{ m.mensagem|default:"—" }}</td>
  <td>
    {% if m.inativo %}
      <span class="badge bg-danger">Inativo</span>
    {% else %}
      <span class="badge bg-success-subtle text-success-emphasis">Ativo</span>
    {% endif %}
  </td>
  <td>
    <div class="d-flex gap-1">
      <a href="{% url 'cadastros:metodo_edit' m.pk %}" class="btn btn-sm btn-outline-primary" title="Editar">
        <i class="bi bi-pencil"></i>
      </a>
      <button class="btn btn-sm {% if m.inativo %}btn-outline-success{% else %}btn-outline-danger{% endif %}"
        hx-post="{% url 'cadastros:metodo_inativar' m.pk %}"
        hx-target="#metodo-{{ m.pk }}" hx-swap="outerHTML"
        hx-confirm="{% if m.inativo %}Reativar {{ m.descricao }}?{% else %}Inativar {{ m.descricao }}?{% endif %}">
        <i class="bi {% if m.inativo %}bi-check-circle{% else %}bi-slash-circle{% endif %}"></i>
      </button>
    </div>
  </td>
</tr>
