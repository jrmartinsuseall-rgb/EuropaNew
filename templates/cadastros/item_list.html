{% extends "base.html" %}
{% block title %}Itens{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/home/">Início</a></li>
<li class="breadcrumb-item active">Itens</li>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-box-seam me-2 text-primary"></i>Itens</h5>
  <a href="{% url 'cadastros:item_create' %}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg"></i> Novo
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-md-5">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input type="search" class="form-control" placeholder="Buscar por descrição, código ou modelo..."
            name="q" autocomplete="off"
            hx-get="{% url 'cadastros:item_buscar' %}"
            hx-trigger="keyup changed delay:300ms, search"
            hx-target="#tabela-wrapper"
            hx-include="[name='grupo']"
            hx-indicator="#spinner">
        </div>
      </div>
      <div class="col-md-3">
        <select name="grupo" class="form-select form-select-sm"
          hx-get="{% url 'cadastros:item_buscar' %}"
          hx-trigger="change"
          hx-target="#tabela-wrapper"
          hx-include="[name='q']">
          <option value="">Todos os grupos</option>
          {% for g in grupos %}
          <option value="{{ g.pk }}">{{ g.descricao }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-auto">
        <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </div>
  </div>
</div>

<div id="tabela-wrapper">
  {% include "cadastros/partials/tabela_itens.html" %}
</div>
{% endblock %}
