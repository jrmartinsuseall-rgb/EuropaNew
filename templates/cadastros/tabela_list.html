{% extends "base.html" %}
{% block title %}Tabelas de Preço{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/home/">Início</a></li>
<li class="breadcrumb-item active">Tabelas de Preço</li>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-tags me-2 text-primary"></i>Tabelas de Preço</h5>
  <a href="{% url 'cadastros:tabela_create' %}" class="btn btn-sm btn-primary">
    <i class="bi bi-plus-lg"></i> Nova Tabela
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <div class="input-group input-group-sm" style="max-width:380px;">
      <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
      <input type="text" name="q" class="form-control"
             placeholder="Buscar por descrição..."
             hx-get="{% url 'cadastros:tabela_buscar' %}"
             hx-trigger="keyup changed delay:300ms"
             hx-target="#tabela-wrapper">
    </div>
  </div>
</div>

<div class="card form-card">
  <div id="tabela-wrapper">
    {% include "cadastros/partials/tabela_tabelas.html" %}
  </div>
</div>
{% endblock %}
