{% extends "base.html" %}
{% block title %}CFOP{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/home/">Início</a></li>
<li class="breadcrumb-item active">CFOP</li>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-file-earmark-text me-2 text-primary"></i>CFOP</h5>
  <a href="{% url 'core:cfop_create' %}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg"></i> Novo
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-md-5">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input type="search" class="form-control" placeholder="Buscar por descrição..."
            name="q" autocomplete="off"
            hx-get="{% url 'core:cfop_buscar' %}"
            hx-trigger="keyup changed delay:300ms, search"
            hx-target="#tabela-wrapper"
            hx-include="[name='tipo']"
            hx-indicator="#spinner">
        </div>
      </div>
      <div class="col-md-2">
        <select name="tipo" class="form-select form-select-sm"
          hx-get="{% url 'core:cfop_buscar' %}"
          hx-trigger="change"
          hx-target="#tabela-wrapper"
          hx-include="[name='q']">
          <option value="">Todos</option>
          <option value="E">Entrada</option>
          <option value="S">Saída</option>
        </select>
      </div>
      <div class="col-auto">
        <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </div>
  </div>
</div>

<div id="tabela-wrapper">
  {% include "core/partials/tabela_cfop.html" %}
</div>
{% endblock %}
