{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso Bloqueado — Europa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .lock-card {
      max-width: 480px;
      margin: 10vh auto 0;
      border-radius: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .lock-icon { font-size: 4rem; color: #dc3545; }
  </style>
</head>
<body>
<div class="container">
  <div class="card lock-card p-4 text-center">
    <div class="mb-3">
      <i class="bi bi-shield-x lock-icon"></i>
    </div>
    <h4 class="fw-bold mb-1">Acesso Bloqueado</h4>
    <p class="text-muted mb-3">
      A licença de uso desta empresa está <strong>expirada ou inativa</strong>.
    </p>
    <hr>
    <p class="small text-muted mb-3">
      Para renovar o acesso entre em contato com o suporte técnico:
    </p>
    <div class="bg-light rounded p-3 mb-4 text-start">
      <div class="small"><i class="bi bi-envelope me-1 text-primary"></i>suporte@wts.com.br</div>
      <div class="small mt-1"><i class="bi bi-whatsapp me-1 text-success"></i>(XX) 9 XXXX-XXXX</div>
    </div>
    <div class="d-flex gap-2 justify-content-center">
      <form method="post" action="{% url 'core:logout' %}" class="d-inline m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Sair
        </button>
      </form>
      {% if user.is_superuser %}
      <a href="{% url 'core:licenca_list' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-shield-lock me-1"></i>Gerenciar Licenças
      </a>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
