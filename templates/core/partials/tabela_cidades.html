<div class="card form-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th>Cidade</th>
          <th style="width:60px">UF</th>
          <th style="width:130px">Cód. IBGE</th>
          <th style="width:80px">Situação</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        {% for c in cidades %}
          {% include "core/partials/linha_cidade.html" %}
        {% empty %}
        <tr>
          <td colspan="6" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-4 d-block mb-1"></i>Nenhuma cidade encontrada.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if cidades %}
  <div class="card-footer text-muted small py-1 px-3">
    {{ cidades|length }} registro(s) exibido(s)
  </div>
  {% endif %}
</div>
