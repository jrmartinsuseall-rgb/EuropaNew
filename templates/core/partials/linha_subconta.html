<tr id="subconta-{{ s.pk }}" class="{% if s.inativo %}text-muted{% endif %}">
  <td class="text-muted small">{{ s.pk }}</td>
  <td>
    <a href="{% url 'core:subconta_edit' s.pk %}" class="text-decoration-none fw-semibold">
      {{ s.descricao }}
    </a>
  </td>
  <td class="small text-muted">{{ s.conta.descricao }}</td>
  <td>
    {% if s.inativo %}
      <span class="badge bg-danger">Inativo</span>
    {% else %}
      <span class="badge bg-success-subtle text-success-emphasis">Ativo</span>
    {% endif %}
  </td>
  <td>
    <div class="d-flex gap-1">
      <a href="{% url 'core:subconta_edit' s.pk %}"
         class="btn btn-sm btn-outline-primary" title="Editar">
        <i class="bi bi-pencil"></i>
      </a>
      <button
        class="btn btn-sm {% if s.inativo %}btn-outline-success{% else %}btn-outline-danger{% endif %}"
        title="{% if s.inativo %}Reativar{% else %}Inativar{% endif %}"
        hx-post="{% url 'core:subconta_inativar' s.pk %}"
        hx-target="#subconta-{{ s.pk }}"
        hx-swap="outerHTML"
        hx-confirm="{% if s.inativo %}Reativar {{ s.descricao }}?{% else %}Inativar {{ s.descricao }}?{% endif %}"
      >
        <i class="bi {% if s.inativo %}bi-check-circle{% else %}bi-slash-circle{% endif %}"></i>
      </button>
    </div>
  </td>
</tr>
