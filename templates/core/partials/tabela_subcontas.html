<div class="card form-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th>Descrição</th>
          <th>Conta</th>
          <th style="width:90px">Situação</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        {% for s in subcontas %}
          {% include "core/partials/linha_subconta.html" %}
        {% empty %}
        <tr>
          <td colspan="5" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-4 d-block mb-1"></i>Nenhuma sub-conta encontrada.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if subcontas %}
  <div class="card-footer text-muted small py-1 px-3">
    {{ subcontas|length }} registro(s)
  </div>
  {% endif %}
</div>
