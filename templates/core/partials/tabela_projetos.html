<div class="card form-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th style="width:60px">#</th>
          <th style="width:120px">Código</th>
          <th>Descrição</th>
          <th style="width:140px">Encerramento</th>
          <th style="width:80px">Situação</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        {% for p in projetos %}
          {% include "core/partials/linha_projeto.html" %}
        {% empty %}
        <tr>
          <td colspan="6" class="text-center text-muted py-4">
            <i class="bi bi-inbox fs-4 d-block mb-1"></i>Nenhum projeto encontrado.
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% if projetos %}
  <div class="card-footer text-muted small py-1 px-3">
    {{ projetos|length }} registro(s)
  </div>
  {% endif %}
</div>
