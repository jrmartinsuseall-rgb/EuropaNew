{% extends "base.html" %}
{% block title %}Cidades{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/home/">Início</a></li>
<li class="breadcrumb-item active">Cidades</li>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-geo-alt me-2 text-primary"></i>Cidades</h5>
  <a href="{% url 'core:cidade_create' %}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg"></i> Nova
  </a>
</div>

<div class="card form-card mb-3">
  <div class="card-body py-2">
    <div class="row g-2 align-items-center">
      <div class="col-md-5">
        <div class="input-group input-group-sm">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input type="search" class="form-control" placeholder="Buscar por nome ou IBGE..."
            name="q" autocomplete="off"
            hx-get="{% url 'core:cidade_buscar' %}"
            hx-trigger="keyup changed delay:300ms, search"
            hx-target="#tabela-wrapper"
            hx-include="[name='uf']"
            hx-indicator="#spinner">
        </div>
      </div>
      <div class="col-md-2">
        <input type="text" name="uf" class="form-control form-control-sm"
          placeholder="UF (ex: SP)" maxlength="2" autocomplete="off"
          style="text-transform:uppercase"
          hx-get="{% url 'core:cidade_buscar' %}"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#tabela-wrapper"
          hx-include="[name='q']">
      </div>
      <div class="col-auto">
        <span id="spinner" class="htmx-indicator spinner-border spinner-border-sm text-primary"></span>
      </div>
    </div>
  </div>
</div>

<div id="tabela-wrapper">
  {% include "core/partials/tabela_cidades.html" %}
</div>
{% endblock %}
