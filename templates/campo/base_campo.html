<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{% block title %}Campo{% endblock %} — Europa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
    :root {
      --bg-main: #0d1117;
      --bg-card: #161b22;
      --bg-card2: #1c2128;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
    }
    body          { background: var(--bg-main); color: var(--text); font-size: 15px; min-height: 100vh; }
    .campo-wrap   { max-width: 500px; margin: 0 auto; padding: 0 12px 80px; }
    .topbar       { background: var(--bg-card); border-bottom: 1px solid var(--border);
                    padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
                    position: sticky; top: 0; z-index: 100; }
    .topbar-logo  { font-weight: 700; font-size: 1.1rem; color: var(--text); }
    .topbar-logo span { color: #0d6efd; }
    .card-campo   { background: var(--bg-card); border: 1px solid var(--border);
                    border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-campo.destaque { border-color: #0d6efd; box-shadow: 0 0 0 1px #0d6efd33; }
    .btn-acao     { width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
                    border-radius: 10px; border: none; }
    .badge-status { font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
    .bs-AGENDADO    { background: #21262d; color: #8b949e; }
    .bs-A_CAMINHO   { background: #0d3a6e; color: #58a6ff; }
    .bs-EM_EXECUCAO { background: #3d2400; color: #e3b341; }
    .bs-PAUSADO     { background: #3d1f00; color: #f0883e; }
    .bs-CONCLUIDO   { background: #0d2d1a; color: #3fb950; }
    .bs-CANCELADO   { background: #2d0f0f; color: #f85149; }
    .bs-PENDENTE    { background: #3d2400; color: #e3b341; }
    .timeline-item  { border-left: 2px solid var(--border); padding: 6px 0 6px 14px;
                      margin-left: 8px; position: relative; font-size: 13px; }
    .timeline-item::before { content: ''; width: 8px; height: 8px; border-radius: 50%;
                             background: #0d6efd; position: absolute; left: -5px; top: 10px; }
    .contador     { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .label-sm     { font-size: 11px; color: var(--muted); text-transform: uppercase;
                    letter-spacing: .06em; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><i class="bi bi-globe2 text-primary"></i> {{ empresa_atual.apelido|default:empresa_atual.razao }}<span>.</span>Campo</div>
  <div class="d-flex align-items-center gap-3">
    <span style="font-size:13px; color: var(--muted);">
      <i class="bi bi-person-circle me-1"></i>{{ request.user.get_full_name|default:request.user.username }}
    </span>
    <form method="post" action="{% url 'core:logout' %}" class="m-0">
      {% csrf_token %}
      <button type="submit" title="Sair"
              style="background:none; border:none; color: var(--muted); cursor:pointer; padding:4px 6px; border-radius:6px; font-size:18px;"
              onmouseover="this.style.color='#f85149'" onmouseout="this.style.color='var(--muted)'">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </form>
  </div>
</div>

<div class="campo-wrap pt-3">
  {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-warning py-2 small mb-3">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
